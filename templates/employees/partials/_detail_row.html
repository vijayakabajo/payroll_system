<div class="flex items-center justify-between" style="padding:.5rem 0;border-bottom:1px solid var(--border-light);">
  <span class="text-xs" style="color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;min-width:130px;">{{ label }}</span>
  <span class="text-sm {% if mono %}font-mono{% endif %}" style="color:var(--text-primary);{% if mono %}font-family:monospace;{% endif %}">{{ value }}</span>
</div>
