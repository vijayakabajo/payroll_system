<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Minu Marketing Payslip System</title>
  <meta name="description" content="Secure PIN login for Minu Marketing Pvt Ltd Payslip Management System"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  {% load static %}
  <script>
    (function(){
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    [data-theme="light"] {
      --bg-base: #f8f9fb;
      --bg-card: #ffffff;
      --bg-input: #f3f4f6;
      --text-primary: #111827;
      --text-muted: #9ca3af;
      --border: #e5e7eb;
      --brand: #f97316;
      --brand-dark: #ea580c;
      --danger: #dc2626;
    }
    [data-theme="dark"] {
      --bg-base: #0f1117;
      --bg-card: #1c1e26;
      --bg-input: #12141a;
      --text-primary: #e5e7eb;
      --text-muted: #6b7280;
      --border: #2a2d37;
      --brand: #f97316;
      --brand-dark: #ea580c;
      --danger: #f87171;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s ease;
    }

    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      padding: 1.5rem;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .logo-img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      margin-bottom: 0.75rem;
    }

    .company-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
    }

    .company-tagline {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.15rem;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.25rem 0;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .pin-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    .pin-input {
      width: 100%;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      font-size: 1.35rem;
      font-family: 'Inter', monospace;
      color: var(--text-primary);
      letter-spacing: 0.5rem;
      text-align: center;
      transition: border-color 0.2s;
      outline: none;
    }
    .pin-input:focus {
      border-color: var(--brand);
    }
    .pin-input.error {
      border-color: var(--danger);
      animation: shake 0.4s ease-in-out;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .error-msg {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--danger);
      margin-top: 0.5rem;
    }

    .btn-login {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.75rem;
      background: var(--brand);
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-login:hover {
      background: var(--brand-dark);
    }

    .footer-note {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 1.5rem;
    }

    .theme-toggle-login {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: border-color 0.2s, color 0.2s;
    }
    .theme-toggle-login:hover {
      border-color: var(--text-primary);
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <!-- Theme toggle on login page -->
  <button class="theme-toggle-login" id="login-theme-toggle" onclick="toggleThemeLogin()" title="Toggle theme">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-wrap">
        <img src="{% static 'images/logo.png' %}" alt="Minu Marketing Logo" class="logo-img"/>
        <div class="company-name">{{ COMPANY_NAME }}</div>
        <div class="company-tagline">{{ COMPANY_TAGLINE }}</div>
      </div>

      <div class="divider"></div>

      <h1>Payslip System</h1>
      <p class="subtitle">Enter your access PIN to continue</p>

      <form method="post" action="{% url 'login' %}" id="pinForm">
        {% csrf_token %}
        <label class="pin-label" for="pin">Access PIN</label>
        <input
          type="password"
          id="pin"
          name="pin"
          class="pin-input {% if error %}error{% endif %}"
          maxlength="10"
          placeholder="• • • • •"
          autofocus
          autocomplete="off"
          inputmode="numeric"
        />
        {% if error %}
        <div class="error-msg">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          {{ error }}
        </div>
        {% endif %}
        <button type="submit" class="btn-login" id="loginBtn">
          Unlock Dashboard
        </button>
      </form>

      <p class="footer-note">Minu Marketing Pvt Ltd &mdash; Payroll Management System</p>
    </div>
  </div>

  <script>
    // Auto-submit on 5 digits
    document.getElementById('pin').addEventListener('input', function() {
      if (this.value.length >= 5) {
        document.getElementById('pinForm').submit();
      }
    });

    // Theme toggle for login page
    function toggleThemeLogin() {
      var html = document.documentElement;
      var current = html.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateLoginThemeIcon(next);
    }
    function updateLoginThemeIcon(theme) {
      var btn = document.getElementById('login-theme-toggle');
      if (!btn) return;
      if (theme === 'dark') {
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
      } else {
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
      }
    }
    updateLoginThemeIcon(document.documentElement.getAttribute('data-theme') || 'light');
  </script>
</body>
</html>
