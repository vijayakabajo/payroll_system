{% load static %}
<aside class="sidebar" id="sidebar">
  <!-- Brand -->
  <div class="sidebar-brand">
    <img src="{% static 'images/logo.png' %}" alt="Logo"/>
    <div class="sidebar-brand-text">
      <div class="sidebar-brand-name">Minu Marketing</div>
      <div class="sidebar-brand-tag">Payslip System</div>
    </div>
  </div>

  <!-- Toggle button -->
  <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Sidebar">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <!-- Overview -->
    <span class="nav-section-label">Overview</span>

    <a href="{% url 'core:dashboard' %}"
       class="nav-item {% if request.resolver_match.namespace == 'core' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span class="nav-label">Dashboard</span>
    </a>

    <!-- People -->
    <span class="nav-section-label">People</span>

    <a href="{% url 'employees:list' %}"
       class="nav-item {% if request.resolver_match.namespace == 'employees' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87"/>
        <path d="M16 3.13a4 4 0 010 7.75"/>
      </svg>
      <span class="nav-label">Employees</span>
    </a>

    <!-- Payroll -->
    <span class="nav-section-label">Payroll</span>

    <a href="{% url 'payroll:generate' %}"
       class="nav-item {% if request.resolver_match.namespace == 'payroll' and request.resolver_match.url_name == 'generate' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <span class="nav-label">Generate Payslip</span>
    </a>

    <a href="{% url 'payroll:history' %}"
       class="nav-item {% if request.resolver_match.namespace == 'payroll' and request.resolver_match.url_name == 'history' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <span class="nav-label">Payslip History</span>
    </a>

    <a href="{% url 'bulk_upload:upload' %}"
       class="nav-item {% if request.resolver_match.namespace == 'bulk_upload' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <polyline points="16 16 12 12 8 16"/>
        <line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
      </svg>
      <span class="nav-label">Bulk Upload</span>
    </a>

    <!-- Settings -->
    <span class="nav-section-label">Settings</span>

    <a href="{% url 'configs:salary_components' %}"
       class="nav-item {% if request.resolver_match.namespace == 'configs' and request.resolver_match.url_name == 'salary_components' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <line x1="12" y1="1" x2="12" y2="23"/>
        <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
      </svg>
      <span class="nav-label">Salary Components</span>
    </a>

    <a href="{% url 'configs:system_settings' %}"
       class="nav-item {% if request.resolver_match.namespace == 'configs' and request.resolver_match.url_name == 'system_settings' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/>
      </svg>
      <span class="nav-label">System Settings</span>
    </a>
  </nav>

  <!-- Sidebar footer -->
  <div class="sidebar-footer">
    <a href="{% url 'logout' %}" class="nav-item" style="color: var(--danger);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span class="nav-label">Logout</span>
    </a>
  </div>
</aside>
