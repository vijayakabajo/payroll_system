{% load static core_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Dashboard{% endblock %} — {{ COMPANY_NAME }} Payslip System</title>
  <meta name="description" content="{% block meta_description %}Payslip Management System for {{ COMPANY_NAME }}{% endblock %}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <!-- Apply saved theme instantly to prevent flash -->
  <script>
    (function(){
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  {% block extra_head %}{% endblock %}
  <style>
    /* ==============================
       CSS DESIGN SYSTEM
    ============================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Brand Colors */
      --brand:         #f97316;
      --brand-dark:    #ea580c;
      --brand-light:   #fb923c;
      --brand-subtle:  rgba(249,115,22,0.08);

      /* Layout */
      --sidebar-w:     250px;
      --sidebar-w-col: 68px;
      --topbar-h:      56px;

      /* Radius */
      --radius-sm:     0.375rem;
      --radius-md:     0.5rem;
      --radius-lg:     0.75rem;
      --radius-xl:     1rem;

      /* Transitions */
      --transition:    0.2s ease;
    }

    /* ==============================
       LIGHT THEME
    ============================== */
    [data-theme="light"] {
      --bg-base:       #f8f9fb;
      --bg-surface:    #ffffff;
      --bg-card:       #ffffff;
      --bg-card-hover: #f3f4f6;
      --bg-input:      #f3f4f6;
      --bg-sidebar:    #ffffff;

      --text-primary:  #111827;
      --text-secondary:#4b5563;
      --text-muted:    #9ca3af;
      --text-inverse:  #ffffff;

      --border:        #e5e7eb;
      --border-light:  #f3f4f6;

      --success:       #059669;
      --success-bg:    rgba(5,150,105,0.08);
      --warning:       #d97706;
      --warning-bg:    rgba(217,119,6,0.08);
      --danger:        #dc2626;
      --danger-bg:     rgba(220,38,38,0.06);
      --info:          #2563eb;
      --info-bg:       rgba(37,99,235,0.06);
      --secondary:     #6b7280;
      --secondary-bg:  rgba(107,114,128,0.08);

      --shadow-sm:     0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:     0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg:     0 4px 16px rgba(0,0,0,0.08);
      --shadow-brand:  0 2px 8px rgba(249,115,22,0.10);

      color-scheme: light;
    }

    /* ==============================
       DARK THEME
    ============================== */
    [data-theme="dark"] {
      --bg-base:       #0f1117;
      --bg-surface:    #16181d;
      --bg-card:       #1c1e26;
      --bg-card-hover: #24262f;
      --bg-input:      #12141a;
      --bg-sidebar:    #12141a;

      --text-primary:  #e5e7eb;
      --text-secondary:#9ca3af;
      --text-muted:    #6b7280;
      --text-inverse:  #111827;

      --border:        #2a2d37;
      --border-light:  #22242c;

      --success:       #34d399;
      --success-bg:    rgba(52,211,153,0.1);
      --warning:       #fbbf24;
      --warning-bg:    rgba(251,191,36,0.1);
      --danger:        #f87171;
      --danger-bg:     rgba(248,113,113,0.08);
      --info:          #60a5fa;
      --info-bg:       rgba(96,165,250,0.08);
      --secondary:     #9ca3af;
      --secondary-bg:  rgba(156,163,175,0.1);

      --shadow-sm:     0 1px 3px rgba(0,0,0,0.3);
      --shadow-md:     0 2px 10px rgba(0,0,0,0.4);
      --shadow-lg:     0 4px 20px rgba(0,0,0,0.5);
      --shadow-brand:  0 2px 10px rgba(249,115,22,0.15);

      color-scheme: dark;
    }

    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.6;
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* ==============================
       SCROLLBAR
    ============================== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--brand); }

    /* ==============================
       LAYOUT
    ============================== */
    .layout { display: flex; height: 100vh; overflow: hidden; }

    /* ==============================
       SIDEBAR
    ============================== */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width var(--transition);
      flex-shrink: 0;
      position: relative;
      z-index: 100;
    }
    .sidebar.collapsed { width: var(--sidebar-w-col); }

    .sidebar-brand {
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0 1.25rem;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .sidebar-brand img {
      width: 36px; height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid var(--brand);
    }
    .sidebar-brand-text { overflow: hidden; white-space: nowrap; }
    .sidebar-brand-name {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .sidebar-brand-tag {
      font-size: 0.65rem;
      color: var(--brand);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .sidebar-toggle {
      position: absolute;
      top: 50%;
      right: -12px;
      transform: translateY(-50%);
      width: 24px; height: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: all var(--transition);
      z-index: 110;
    }
    .sidebar-toggle:hover { color: var(--brand); border-color: var(--brand); }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .nav-section-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.5rem 0.5rem 0.25rem;
      white-space: nowrap;
      overflow: hidden;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.75rem;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.83rem;
      font-weight: 500;
      transition: all var(--transition);
      white-space: nowrap;
      overflow: hidden;
      position: relative;
    }
    .nav-item:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }
    .nav-item.active {
      background: var(--brand-subtle);
      color: var(--brand);
    }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 60%;
      background: var(--brand);
      border-radius: 0 2px 2px 0;
    }
    .nav-item svg {
      width: 18px; height: 18px;
      flex-shrink: 0;
      stroke-width: 1.75;
    }
    .nav-label { transition: opacity var(--transition); }
    .sidebar.collapsed .nav-label,
    .sidebar.collapsed .nav-section-label,
    .sidebar.collapsed .sidebar-brand-text { opacity: 0; pointer-events: none; width: 0; }

    .sidebar-footer {
      padding: 0.75rem;
      border-top: 1px solid var(--border);
    }

    /* ==============================
       MAIN CONTENT
    ============================== */
    .main-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ==============================
       TOPBAR
    ============================== */
    .topbar {
      height: var(--topbar-h);
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      gap: 1rem;
      flex-shrink: 0;
    }

    .topbar-left { display: flex; align-items: center; gap: 1rem; }

    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .breadcrumbs a { color: var(--text-muted); text-decoration: none; }
    .breadcrumbs a:hover { color: var(--brand); }
    .breadcrumbs .current { color: var(--text-primary); font-weight: 500; }
    .breadcrumbs .sep { color: var(--border); }

    .topbar-right { display: flex; align-items: center; gap: 0.75rem; }

    .topbar-company {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .btn-logout {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.875rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-size: 0.78rem;
      font-weight: 500;
      text-decoration: none;
      transition: all var(--transition);
      cursor: pointer;
    }
    .btn-logout:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: var(--danger-bg);
    }

    /* ==============================
       PAGE CONTENT
    ============================== */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 1.75rem;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .page-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .page-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }

    /* ==============================
       CARDS
    ============================== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      transition: border-color var(--transition);
    }
    .card:hover { border-color: var(--text-muted); }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .card-title { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }
    .card-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.1rem; }

    /* ==============================
       STAT CARDS
    ============================== */
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: border-color var(--transition);
    }
    .stat-card:hover {
      border-color: var(--text-muted);
    }

    .stat-icon {
      width: 42px; height: 42px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .stat-icon.orange { background: var(--brand-subtle); color: var(--brand); }
    .stat-icon.green  { background: var(--success-bg);   color: var(--success); }
    .stat-icon.yellow { background: var(--warning-bg);   color: var(--warning); }
    .stat-icon.red    { background: var(--danger-bg);    color: var(--danger); }
    .stat-icon.blue   { background: var(--info-bg);      color: var(--info); }
    .stat-icon svg { width: 20px; height: 20px; }

    .stat-info { flex: 1; min-width: 0; }
    .stat-value {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      font-weight: 500;
    }

    /* ==============================
       TABLES
    ============================== */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius-md);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    thead { background: var(--bg-base); }
    thead th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border-light);
      transition: background var(--transition);
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-card-hover); }
    tbody td {
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      vertical-align: middle;
    }
    .td-muted { color: var(--text-muted); }

    /* ==============================
       BADGES
    ============================== */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .badge-success  { background: var(--success-bg);   color: var(--success); }
    .badge-warning  { background: var(--warning-bg);   color: var(--warning); }
    .badge-danger   { background: var(--danger-bg);    color: var(--danger); }
    .badge-info     { background: var(--info-bg);      color: var(--info); }
    .badge-secondary{ background: var(--secondary-bg); color: var(--secondary); }

    /* ==============================
       BUTTONS
    ============================== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-md);
      font-size: 0.82rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .btn svg { width: 15px; height: 15px; }

    .btn-primary {
      background: var(--brand);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--brand-dark);
    }
    .btn-secondary {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .btn-secondary:hover { border-color: var(--brand); color: var(--brand); }
    .btn-danger {
      background: var(--danger-bg);
      border: 1px solid var(--danger);
      color: var(--danger);
    }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.75rem; }
    .btn-xs { padding: 0.2rem 0.5rem; font-size: 0.7rem; }

    /* ==============================
       FORMS
    ============================== */
    .form-group { margin-bottom: 1.25rem; }
    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }
    .form-control {
      width: 100%;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.6rem 0.875rem;
      font-size: 0.85rem;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }
    .form-control:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
    }
    .form-control::placeholder { color: var(--text-muted); }
    select.form-control { cursor: pointer; }

    /* ==============================
       SEARCH BAR
    ============================== */
    .search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      color: var(--text-muted);
      width: 15px; height: 15px;
      pointer-events: none;
    }
    .search-wrap .form-control { padding-left: 2.25rem; }

    /* ==============================
       GRIDS
    ============================== */
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }
    .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 1rem; }
    @media (max-width: 1200px) { .grid-4 { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 900px)  { .grid-3, .grid-4 { grid-template-columns: 1fr; } }
    @media (max-width: 700px)  { .grid-2 { grid-template-columns: 1fr; } }

    /* ==============================
       HTMX LOADING INDICATORS
    ============================== */
    .htmx-indicator { opacity: 0; transition: opacity 300ms ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-request.htmx-indicator { opacity: 1; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Skeleton loader */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* ==============================
       TOASTS
    ============================== */
    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }
    .toast {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-primary);
      pointer-events: all;
      animation: slideIn 0.3s ease;
      min-width: 260px;
      max-width: 380px;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.info    { border-left: 3px solid var(--info); }
    .toast.warning { border-left: 3px solid var(--warning); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ==============================
       PAGINATION
    ============================== */
    .pagination {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .page-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      border: 1px solid var(--border);
      transition: all var(--transition);
    }
    .page-link:hover { border-color: var(--brand); color: var(--brand); }
    .page-link.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }
    .page-link.disabled { opacity: 0.4; pointer-events: none; }

    /* ==============================
       MODAL SLIDE-IN
    ============================== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2rem;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: modalSlide 0.25s ease;
    }
    @keyframes modalSlide {
      from { opacity: 0; transform: scale(0.95) translateY(-10px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .modal-title { font-size: 1rem; font-weight: 700; }
    .modal-close {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
    }
    .modal-close:hover { border-color: var(--danger); color: var(--danger); }

    /* ==============================
       PROGRESS BAR
    ============================== */
    .progress-bar-wrap {
      background: var(--bg-input);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--brand);
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    /* ==============================
       UTILITY
    ============================== */
    .text-muted     { color: var(--text-muted); }
    .text-brand     { color: var(--brand); }
    .text-success   { color: var(--success); }
    .text-danger    { color: var(--danger); }
    .text-warning   { color: var(--warning); }
    .text-sm        { font-size: 0.78rem; }
    .text-xs        { font-size: 0.7rem; }
    .font-bold      { font-weight: 700; }
    .font-semibold  { font-weight: 600; }
    .mt-1 { margin-top: 0.25rem; }
    .mt-2 { margin-top: 0.5rem; }
    .mt-3 { margin-top: 0.75rem; }
    .mt-4 { margin-top: 1rem; }
    .mb-1 { margin-bottom: 0.25rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-3 { margin-bottom: 0.75rem; }
    .mb-4 { margin-bottom: 1rem; }
    .gap-1 { gap: 0.25rem; }
    .gap-2 { gap: 0.5rem; }
    .flex  { display: flex; }
    .flex-wrap { flex-wrap: wrap; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .w-full { width: 100%; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <div class="layout">
    <!-- ====== SIDEBAR ====== -->
    {% include 'components/_sidebar.html' %}

    <!-- ====== MAIN ====== -->
    <div class="main-wrap">
      <!-- TOPBAR -->
      {% include 'components/_topbar.html' %}

      <!-- CONTENT -->
      <main class="content" id="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div id="toast-container"></div>

  <!-- MODAL CONTAINER for HTMX responses -->
  <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
    <div id="modal-panel" class="modal-panel">
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    // ==============================
    // SIDEBAR TOGGLE
    // ==============================
    const sidebar = document.querySelector('.sidebar');
    function toggleSidebar() {
      sidebar.classList.toggle('collapsed');
      localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
    }
    if (localStorage.getItem('sidebarCollapsed') === 'true') {
      sidebar.classList.add('collapsed');
    }

    // ==============================
    // THEME TOGGLE
    // ==============================
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon(next);
    }
    function updateThemeIcon(theme) {
      const btn = document.getElementById('theme-toggle-btn');
      if (!btn) return;
      if (theme === 'dark') {
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
      } else {
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
      }
    }
    // Set correct icon on load
    updateThemeIcon(document.documentElement.getAttribute('data-theme') || 'light');

    // ==============================
    // TOAST SYSTEM
    // ==============================
    function showToast(message, type = 'info', duration = 4000) {
      const icons = {
        success: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
        error:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        warning: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
        info:    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
      };
      const colors = { success: '#10b981', error: '#ef4444', warning: '#f59e0b', info: '#3b82f6' };
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.style.color = colors[type] || '#94a3b8';
      toast.innerHTML = `${icons[type] || ''} <span style="color:var(--text-primary)">${message}</span>`;
      document.getElementById('toast-container').appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, duration);
    }

    // Django messages → toasts
    {% if messages %}
    {% for message in messages %}
    showToast("{{ message }}", "{% if message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% elif message.tags == 'success' %}success{% else %}info{% endif %}");
    {% endfor %}
    {% endif %}

    // ==============================
    // MODAL SYSTEM
    // ==============================
    function openModal() {
      document.getElementById('modal-overlay').classList.add('open');
    }
    function closeModal(event) {
      if (event.target === document.getElementById('modal-overlay')) {
        document.getElementById('modal-overlay').classList.remove('open');
      }
    }
    function closeModalExplicit() {
      document.getElementById('modal-overlay').classList.remove('open');
    }

    // HTMX events
    document.body.addEventListener('htmx:afterRequest', function(evt) {
      const triggerHeader = evt.detail.xhr.getResponseHeader('HX-Trigger');
      if (triggerHeader) {
        try {
          const triggers = JSON.parse(triggerHeader);
          if (triggers.showToast) showToast(triggers.showToast.message, triggers.showToast.type || 'success');
          if (triggers.closeModal) closeModalExplicit();
          if (triggers.openModal) openModal();
        } catch(e) {}
      }
    });
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
