{% extends 'base.html' %}
{% load core_tags %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Dashboard</h1>
    <p class="page-subtitle">Welcome back — Minu Marketing Pvt Ltd Payslip System</p>
  </div>
</div>

<!-- Stats widgets — lazy loaded via HTMX -->
<div id="stats-container"
     hx-get="{% url 'core:dashboard_stats' %}"
     hx-trigger="load"
     hx-indicator="#stats-spinner">
  <!-- Skeleton placeholders -->
  <div class="grid-4" style="margin-bottom:1.25rem;">
    {% for i in "1234" %}
    <div class="stat-card">
      <div class="stat-icon orange">
        <div class="skeleton" style="width:22px;height:22px;border-radius:4px;"></div>
      </div>
      <div class="stat-info">
        <div class="skeleton" style="width:60px;height:28px;border-radius:4px;margin-bottom:6px;"></div>
        <div class="skeleton" style="width:100px;height:12px;border-radius:4px;"></div>
      </div>
    </div>
    {% endfor %}
  </div>
  <span id="stats-spinner" class="htmx-indicator spinner" style="display:none;"></span>
</div>

<!-- Quick Actions -->
<div class="card mb-4" style="padding:1.25rem;">
  <div class="card-header" style="margin-bottom:1rem;padding-bottom:.75rem;">
    <div class="card-title">Quick Actions</div>
  </div>
  <div class="flex flex-wrap gap-2">
    <a href="{% url 'payroll:generate' %}" class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Generate Payslip
    </a>
    <a href="{% url 'bulk_upload:upload' %}" class="btn btn-secondary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
      Bulk Upload
    </a>
    <a href="{% url 'employees:create' %}" class="btn btn-secondary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      Add Employee
    </a>
    <a href="{% url 'payroll:history' %}" class="btn btn-secondary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Payslip History
    </a>
  </div>
</div>

<!-- Recent Uploads & Activity side by side -->
<div class="grid-2" style="align-items:start;">
  <div id="recent-uploads-container"
       hx-get="{% url 'core:recent_uploads_widget' %}"
       hx-trigger="load">
    <div class="card"><div class="skeleton" style="height:180px;border-radius:var(--radius-md);"></div></div>
  </div>
  <div id="activity-container"
       hx-get="{% url 'core:activity_widget' %}"
       hx-trigger="load">
    <div class="card"><div class="skeleton" style="height:180px;border-radius:var(--radius-md);"></div></div>
  </div>
</div>
{% endblock %}
